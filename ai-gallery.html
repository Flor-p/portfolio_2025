    reset: true

        x: 30,
        z: 30
    }
});

ScrollReveal().reveal('.scaleUp', { scale: 1.5 });

</script>

<script>
    // Function to add fancybox gallery functionality
    $(document).ready(function() {
        $('[data-fancybox="gallery"]').fancybox();
    });

    // Function to create fading effect on images
    function addImageFadingEffect() {
        const images = document.querySelectorAll('.img-fluid');
        
        images.forEach(image => {
            image.addEventListener('mouseenter', () => {
                gsap.to(image, {
                    duration: 0.5,
                    opacity: 0.5, // Change this value to adjust the opacity during hover
                    ease: 'power2.out'
                });
            });

            image.addEventListener('mouseleave', () => {
                gsap.to(image, {
                    duration: 0.5,
                    opacity: 1,
                    ease: 'power2.out'
                });
            });
        });
    }

    // Call the function when the DOM is fully loaded
    document.addEventListener('DOMContentLoaded', addImageFadingEffect);

    // Function to handle scroll-to-top button
    $(document).ready(function() {
    $(window).scroll(function() {
        if ($(this).scrollTop() > 100) {
            $('.navbar').addClass('scrolled');
        } else {
            $('.navbar').removeClass('scrolled');
        }
    });
});

    // Function to handle scroll event for parallax effect
    function handleScroll() {
        const navbar = document.querySelector('.navbar');
        const scrollY = window.scrollY;

        if (scrollY > 50) {
            navbar.classList.add('light');
        } else {
            navbar.classList.remove('light');
        }
    }

    // Add event listener for scroll event
    window.addEventListener('scroll', handleScroll);  

      // Create the custom cursor
   const cursor = document.createElement("div");
   cursor.classList.add("custom-cursor");
   document.body.appendChild(cursor);
 
   // Make the cursor follow the mouse
   document.addEventListener("mousemove", (e) => {
     cursor.style.left = `${e.pageX}px`;
     cursor.style.top = `${e.pageY}px`;
   });
 
   // Enlarge the cursor when hovering over interactive elements
   const interactiveElements = document.querySelectorAll("a, button, .interactive");
   interactiveElements.forEach((element) => {
     element.addEventListener("mouseenter", () => {
       cursor.classList.add("cursor-hover");
     });
     element.addEventListener("mouseleave", () => {
       cursor.classList.remove("cursor-hover");
     });
   });

</script>
